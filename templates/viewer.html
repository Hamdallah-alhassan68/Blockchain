<!DOCTYPE html>
<html>
<head>
    <title>Blockchain Viewer</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .block {
            background: white;
            margin: 15px auto;
            padding: 15px;
            width: 60%;
            border-radius: 10px;
            box-shadow: 0 0 8px gray;
            text-align: left;
        }

        button {
            padding: 10px 20px;
            margin: 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>

<h1>⛓️ Blockchain Viewer</h1>

<button onclick="loadBlockchain()">Load Blockchain</button>

<div id="chain"></div>

<script>
function loadBlockchain() {
    fetch('/chain')
    .then(res => res.json())
    .then(data => {
        let output = '';

        data.forEach(block => {
            output += `
                <div class="block">
                    <h3>Block ${block.index}</h3>
                    <p><strong>Timestamp:</strong> ${block.timestamp}</p>
                    <p><strong>Previous Hash:</strong> ${block.previous_hash}</p>
                    <p><strong>Transactions:</strong></p>
                    <pre>${JSON.stringify(block.transactions, null, 2)}</pre>
                </div>
            `;
        });

        document.getElementById('chain').innerHTML = output;
    });
}
</script>

</body>
</html>
