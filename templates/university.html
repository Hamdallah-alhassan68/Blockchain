<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Panel</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: 50px auto;
      background-color: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #555;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 20px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
      transition: border 0.3s;
    }

    input:focus {
      border-color: #007BFF;
      outline: none;
    }

    button {
      padding: 12px 20px;
      margin-right: 10px;
      border: none;
      border-radius: 5px;
      background-color: #007BFF;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }

    .output {
      margin-top: 20px;
      padding: 15px;
      border-radius: 5px;
      background-color: #e9f7ef;
      color: #2e7d32;
      font-weight: 500;
    }

    .cert-id {
      margin-top: 10px;
      font-size: 14px;
      color: #0d47a1;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🎓 University Panel</h2>

    <!-- Inputs -->
    <label for="name">Student Name</label>
    <input id="name" type="text" placeholder="Enter student name">

    <label for="course">Course</label>
    <input id="course" type="text" placeholder="Enter course name">

    <label for="grade">Grade</label>
    <input id="grade" type="text" placeholder="Enter grade">

    <!-- Buttons -->
    <button onclick="issue()">Issue Certificate</button>
    <button onclick="mine()">Mine Block</button>
    <button onclick="getStudentID()">Get Student ID</button>

    <!-- Feedback Messages -->
    <div id="message" class="output" style="display:none;"></div>
    <div id="certDisplay" class="cert-id"></div>
  </div>

  <script>
    function mine() {
      fetch('/mine_block')
        .then(res => res.json())
        .then(data => alert("⛏️ Block mined successfully!"))
        .catch(err => alert("Mining failed: " + err));
    }

    function issue() {
      const name = document.getElementById('name').value.trim();
      const course = document.getElementById('course').value.trim();
      const grade = document.getElementById('grade').value.trim();

      if (!name || !course || !grade) {
        alert("Please fill in all fields");
        return;
      }

      fetch('/add_certificate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ student_name: name, course: course, grade: grade })
      })
      .then(res => {
        if (!res.ok) throw new Error('Server responded with ' + res.status);
        return res.json();
      })
      .then(data => {
        const messageDiv = document.getElementById("message");
        messageDiv.style.display = "block";
        messageDiv.innerHTML = "✅ Certificate created (waiting for mining)";

        document.getElementById("certDisplay").innerHTML =
          "<strong>Certificate ID:</strong> " + data.certificate_id;
      })
      .catch(error => {
        alert("Error: Could not connect to the server.");
        console.error("Fetch Error:", error);
      });
    }

    function getStudentID() {
      alert("Functionality to fetch Student ID not yet implemented on backend.");
    }
  </script>
</body>
</html>
